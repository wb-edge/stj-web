<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>STJ Web</title>
    <script type="text/javascript">
        // 하위 경로(?/raid)를 다시 정상 경로(/raid)로 복구하는 스크립트
        (function(l) {
            if (l.search[1] === '/' ) {
                var decoded = l.search.slice(1).split('&').map(function(s) { 
                    return s.replace(/~and~/g, '&')
                }).join('?');
                
                // 현재 URL에서 쿼리스트링(?/raid) 부분을 제외한 순수 경로를 가져와서 합칩니다.
                window.history.replaceState(null, null,
                    l.pathname.replace(/\/$/, '') + decoded + l.hash
                );
            }
        }(window.location))
    </script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
